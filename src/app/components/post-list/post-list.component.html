<div id="back-part"></div>
<div class="container">
    <div class="content-wrapper">
        <div class="menu">
            <a href="/"><img src="assets/img/logo.png" class="logo"></a>
            <!--<i class="fa fa-envelope"></i>-->
            <a href="https://www.linkedin.com/in/marcus-m%C3%BCnger-034398123/"><i class="fa fa-linkedin-square"></i></a>
            <a href="https://stackoverflow.com/users/3566441/munhunger"><i class="fa fa-stack-overflow"></i></a>
            <a href="https://github.com/munhunger"><i class="fa fa-github"></i></a>
            <!--<i class="fa fa-user"></i>-->
        </div>
        <div class="header">
            <code-block [inline]="false" src="/assets/data/posts.json"></code-block>
            <div class="overlay-title">
                <span>munHunger</span>
            </div>
        </div>
        <div class="content">
            <div *ngFor="let post of list" class="post col-lg-4 col-md-6 col-sm-12" (click)="click(post)">
                <code-block thumbnail="true" code="{{toJSON(post)}}"></code-block>
            </div>
        </div>
    </div>
</div>
